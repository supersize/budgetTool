version: '3.8'

services:
  # 1. Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2
    networks:
      - budgetTool-docker-network

  # 2 & 3. Spring Boot Applications
  app-1: &app-base
    image: ${DOCKERHUB_USERNAME}/jhk_docker_hub_repo:${GITHUB_SHA}
#    environment:
#      - AWS_RDS_URL=${AWS_RDS_URL}
#      - AWS_RDS_USERNAME=${AWS_RDS_USERNAME}
#      - AWS_RDS_PASSWORD=${AWS_RDS_PASSWORD}
#      - AWS_REDIS_URL=${AWS_REDIS_URL}
#      - AWS_REDIS_PORT=${AWS_REDIS_PORT}
#      - MAIL_SENDER_NAME=${MAIL_SENDER_NAME}
#      - MAIL_SENDER_PASSWORD="${MAIL_SENDER_PASSWORD}"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 200M
    networks:
      - budgetTool-docker-network

  app-2:
    <<: *app-base

# better set db in RDS due to persistance issue and easy to be deteleted. ==> storage problem!!
#  # 4. Database
#  db-master:
#    image: postgres:alpine
#    environment:
#      POSTGRES_DB: postgres
#      POSTGRES_PASSWORD: ${AWS_RDS_PASSWORD}
#      POSTGRES_USER: postgres
#    deploy:
#      resources:
#        limits:
#          memory: 200M
#    networks:
#      - budgetTool-docker-network

  # 5. Redis
  redis:
    image: redis:alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 100M
    networks:
      - budgetTool-docker-network

  # 6. Prometheus (The Data Collector)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    # Prometheus UI is available at port 9090 if needed
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 150M
    networks:
      - budgetTool-docker-network

  # 7. Grafana (The Dashboard UI) 👈 ADDED THIS
  grafana:
    image: grafana/grafana-oss
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default password
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - budgetTool-docker-network

networks:
  budgetTool-docker-network:
    driver: bridge