version: '3.8' # for memory managing~

services:
  # 1. Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2
    networks:
      - budgetTool-docker-network

  # 2 & 3. Spring Boot Applications
  app-1: &app-base
    image: ${DOCKER_HUB_USERNAME}/my-app:latest
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-master:5432/mydb
      - SPRING_REDIS_HOST=redis
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 200M
    networks:
      - budgetTool-docker-network

  app-2:
    <<: *app-base # This '<<: *' copies everything from app-1 into app-2

  # 4 & 5. Database (Master & Slave)
  db-master:
    image: postgres:alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: postgres
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - budgetTool-docker-network

  # 6. Redis Cache
  redis:
    image: redis:alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 100M
    networks:
      - budgetTool-docker-network

  # 7. Monitoring (Prometheus/Grafana combined example)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      resources:
        limits:
          memory: 150M
    networks:
      - budgetTool-docker-network

networks:
  budgetTool-docker-network:
    driver: bridge


