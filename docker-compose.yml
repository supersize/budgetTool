version: '3.8'

services:
  # 1. Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2
    networks:
      - budgetTool-docker-network

  # 2 & 3. Spring Boot Applications
  app-1: &app-base
    image: ${DOCKERHUB_USERNAME}/jhk_docker_hub_repo:${GITHUB_SHA}
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AWS_RDS_URL=${AWS_RDS_URL}
      - AWS_RDS_USERNAME=${AWS_RDS_USERNAME}
      - AWS_RDS_PASSWORD=${AWS_RDS_PASSWORD}
      - MAIL_SENDER_NAME=${MAIL_SENDER_NAME}
      - MAIL_SENDER_PASSWORD=${MAIL_SENDER_PASSWORD}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 200M
    networks:
      - budgetTool-docker-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # 로그 파일 하나당 최대 10MB
        max-file: "3"     # 파일은 최대 3개까지만 보관 (총 30MB 제한)

  app-2:
    <<: *app-base

  # 5. Redis
  redis:
    image: redis:alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M
    networks:
      - budgetTool-docker-network

  # 6. Prometheus (The Data Collector)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    # Prometheus UI is available at port 9090 if needed
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 150M
    networks:
      - budgetTool-docker-network

  # 7. Grafana (The Dashboard UI) 👈 ADDED THIS
  grafana:
    image: grafana/grafana-oss
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default password
      - GF_SERVER_ROOT_URL=https://jhkarchive.com/grafana/  # 본인 도메인 입력
      - GF_SERVER_SERVE_FROM_SUB_PATH=true                 # 하위 경로 사용 여부
      - GF_SERVER_PROTOCOL=http
      - GF_SERVER_DOMAIN=jhkarchive.com # 도메인 명시
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - budgetTool-docker-network

networks:
  budgetTool-docker-network:
    driver: bridge